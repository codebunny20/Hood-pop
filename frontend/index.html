<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hood-pop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="bg-glow bg-glow-one"></div>
<div class="bg-glow bg-glow-two"></div>

<main class="welcome-shell">
    <section class="welcome-card">
        <div class="chip">HOOD-POP</div>
        <h1>Welcome to Hood-pop</h1>
        <p>Pick the services you need and lock in your appointment.</p>

        <section class="services-panel" aria-label="Common mechanic services">
            <div class="services-header">
                <h2>Services we offer</h2>
                <span id="selected-count">0 selected</span>
            </div>

            <div class="services-grid" id="services-grid">
                <button class="service-btn" type="button" data-service="Oil Change">
                    <strong>Oil Change</strong>
                    <span>Full synthetic or blend options</span>
                </button>
                <button class="service-btn" type="button" data-service="Brake Inspection">
                    <strong>Brake Inspection</strong>
                    <span>Pads, rotors, and fluid check</span>
                </button>
                <button class="service-btn" type="button" data-service="Tire Rotation">
                    <strong>Tire Rotation</strong>
                    <span>Even wear and longer tire life</span>
                </button>
                <button class="service-btn" type="button" data-service="Battery Test">
                    <strong>Battery Test</strong>
                    <span>Charging and health diagnostics</span>
                </button>
                <button class="service-btn" type="button" data-service="Engine Diagnostics">
                    <strong>Engine Diagnostics</strong>
                    <span>Warning lights and system scan</span>
                </button>
                <button class="service-btn" type="button" data-service="A/C Service">
                    <strong>A/C Service</strong>
                    <span>Cooling performance and recharge</span>
                </button>
                <button class="service-btn" type="button" data-service="Wheel Alignment">
                    <strong>Wheel Alignment</strong>
                    <span>Steering correction and balancing</span>
                </button>
                <button class="service-btn" type="button" data-service="Transmission Check">
                    <strong>Transmission Check</strong>
                    <span>Fluid and shifting performance</span>
                </button>
            </div>

            <div class="cta-row">
                <button id="book-btn" class="cta-btn" type="button">Book Service</button>
                <button id="aboutus-btn" class="ghost-btn" type="button">About Hood-pop</button>
            </div>
        </section>
    </section>
</main>

<script src="script.js"></script>

</body>
</html>
