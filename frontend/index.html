<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="bg-glow bg-glow-one"></div>
<div class="bg-glow bg-glow-two"></div>

<div class="navbar">
    <div class="navbar-title-wrap">
        <div class="navbar-title">Your Site</div>
        <div class="navbar-subtitle">Control center</div>
    </div>
    <div class="navbar-actions">
        <button class="icon-btn" aria-label="Search">⌕</button>
        <button class="icon-btn" aria-label="Settings">⚙</button>
    </div>
</div>

<div class="layout">

    <div class="sidebar">
        <div class="sidebar-item active"><span>◉</span>Home</div>
        <div class="sidebar-item"><span>◇</span>Tools</div>
        <div class="sidebar-item"><span>⚒</span>Settings</div>
    </div>

    <div class="main">
        <div class="card hero-card">
            <div class="chip">NEW DASHBOARD</div>
            <div class="card-title">Welcome back</div>
            <p>This updated interface uses a cleaner visual system, stronger hierarchy, and better spacing.</p>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">Tasks</div>
                    <div class="stat-value">24</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Active Users</div>
                    <div class="stat-value">1.2k</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Uptime</div>
                    <div class="stat-value">99.9%</div>
                </div>
            </div>

            <div class="button-row">
                <button class="btn btn-primary">Primary Button</button>
                <button class="btn btn-secondary">Secondary Button</button>
            </div>
        </div>

        <div class="card card-spaced">
            <div class="card-title">Example Form</div>
            <label for="userText">Message</label>
            <input id="userText" type="text" placeholder="Enter text...">

            <label for="details">Details</label>
            <textarea id="details" placeholder="Write something..."></textarea>

            <button class="btn btn-primary">Submit</button>
        </div>
    </div>

</div>

</body>
</html>
